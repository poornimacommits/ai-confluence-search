services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      ENABLE_MODULES: text2vec-transformers
      WEAVIATE_ENABLE_UI: "true"
      ENABLE_CORS: "true"             # allow Studio to connect from host
      WEAVIATE_HOST: "localhost"      # fixes redirect to /v1 
      TRANSFORMERS_INFERENCE_API: http://text2vec-transformers:8080
    depends_on:
      - text2vec-transformers

  # BAAI/bge-small-en-v1.5 embedding model via transformers
  text2vec-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:baai-bge-small-en-v1.5
    environment:
      MODEL_NAME: BAAI/bge-small-en-v1.5
      ENABLE_CUDA: "0"